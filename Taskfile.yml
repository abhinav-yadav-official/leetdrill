version: "3"

dotenv: [".env"]

vars:
  PG_DSN:
    sh: 'printf "%s" "${DATABASE_URL:-postgres://leetdrill:leetdrill@localhost:5433/leetdrill?sslmode=disable}"'
  MIG_DIR: "./migrations"
  GOOSE: "go run github.com/pressly/goose/v3/cmd/goose@latest"

tasks:
  default:
    cmds:
      - task --list

  dev:
    desc: "Run server with live reload (requires `air`); else plain go run."
    cmds:
      - |
        if command -v air >/dev/null 2>&1; then
          air
        else
          go run ./cmd/server
        fi

  build:
    desc: "Build all binaries to ./bin."
    cmds:
      - mkdir -p bin
      - go build -o bin/server ./cmd/server
      - go build -o bin/ingest ./cmd/ingest

  test:
    desc: "Run go test."
    cmds:
      - go test ./...

  extension:package:
    desc: "Build shareable Chrome/Firefox extension packages."
    cmds:
      - python3 scripts/check_extensions.py
      - python3 scripts/package_extension.py

  extension:deploy:
    desc: "Package extension and deploy to /var/www/html/shared on the VPS."
    cmds:
      - bash scripts/deploy_extension_share.sh {{.CLI_ARGS}}

  vet:
    desc: "go vet."
    cmds:
      - go vet ./...

  tidy:
    desc: "go mod tidy."
    cmds:
      - go mod tidy

  db:up:
    desc: "Start postgres."
    cmds:
      - docker compose up -d db

  db:down:
    desc: "Stop postgres."
    cmds:
      - docker compose down

  db:psql:
    desc: "Open psql shell on local db."
    cmds:
      - docker compose exec db psql -U leetdrill -d leetdrill

  migrate:up:
    desc: "Apply pending migrations."
    cmds:
      - "{{.GOOSE}} -dir {{.MIG_DIR}} postgres \"{{.PG_DSN}}\" up"

  migrate:down:
    desc: "Roll back one migration."
    cmds:
      - "{{.GOOSE}} -dir {{.MIG_DIR}} postgres \"{{.PG_DSN}}\" down"

  migrate:status:
    cmds:
      - "{{.GOOSE}} -dir {{.MIG_DIR}} postgres \"{{.PG_DSN}}\" status"

  migrate:new:
    desc: "Create a new migration: task migrate:new -- name"
    cmds:
      - "{{.GOOSE}} -dir {{.MIG_DIR}} create {{.CLI_ARGS}} sql"

  ingest:
    desc: "Run LeetCode catalog ingest (phase 0: log only)."
    cmds:
      - go run ./cmd/ingest {{.CLI_ARGS}}

  tailwind:
    desc: "Build Tailwind CSS into web/static/app.css (requires tailwind CLI on PATH)."
    cmds:
      - tailwindcss -i web/static/app.src.css -o web/static/app.css --minify

  install:tools:
    desc: "Install Go tools used by the project."
    cmds:
      - go install github.com/pressly/goose/v3/cmd/goose@latest
      - go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
      - go install github.com/air-verse/air@latest
