{{define "content"}}
<div class="flex flex-col gap-4">
  <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
    <div>
      <h1 class="text-2xl font-semibold tracking-tight">Today</h1>
    </div>
    <div class="flex flex-wrap gap-2">
      <form class="flex gap-2" method="get" action="{{appPath "/session/today"}}">
        <select class="rounded-md border border-zinc-300 bg-white px-3 py-2 text-sm" name="filter">
          <option value="" {{if eq .Data.Filter ""}}selected{{end}}>all</option>
          <option value="solved" {{if eq .Data.Filter "solved"}}selected{{end}}>solved</option>
          <option value="not-solved" {{if eq .Data.Filter "not-solved"}}selected{{end}}>not solved</option>
        </select>
        <button class="rounded-md border border-zinc-300 bg-white px-3 py-2 text-sm font-medium hover:bg-zinc-50">Apply</button>
      </form>
      <form method="post" action="{{appPath "/session/start"}}">
        <button class="rounded-md bg-zinc-900 px-4 py-2 text-sm font-medium text-white">Refresh session</button>
      </form>
    </div>
  </div>
  <div id="session-card">
    {{template "session_card" .Data.Card}}
  </div>
</div>
{{end}}
