<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>LeetDrill</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 12px;
        width: 320px;
        background: #0f172a;
        color: #e2e8f0;
      }
      h1 { font-size: 14px; margin: 0 0 8px; }
      label { display: block; margin: 10px 0 4px; font-size: 11px; color: #94a3b8; }
      input, textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #334155;
        border-radius: 4px;
        background: #020617;
        color: #e2e8f0;
        padding: 7px 8px;
        font-size: 12px;
      }
      textarea {
        min-height: 64px;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
      }
      .status {
        font-size: 12px;
        padding: 4px 8px;
        border-radius: 4px;
        margin-bottom: 12px;
        background: #1e293b;
      }
      .ok { color: #4ade80; }
      .bad { color: #f87171; }
      .muted { color: #94a3b8; }
      button {
        width: 100%;
        padding: 8px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 13px;
        cursor: pointer;
      }
      button:disabled { background: #334155; cursor: default; }
      .row { display: flex; gap: 8px; margin-top: 8px; }
      .row button { flex: 1; }
      .problem-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 10px;
      }
      .problem {
        width: 100%;
        text-align: left;
        background: #1e293b;
        border: 1px solid #334155;
        color: #e2e8f0;
      }
      .problem.done {
        border-color: #15803d;
      }
      .problem-title {
        display: block;
        font-weight: 600;
        font-size: 12px;
      }
      .problem-meta {
        display: block;
        margin-top: 3px;
        color: #94a3b8;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <h1>LeetDrill</h1>
    <div id="status" class="status">checking...</div>

    <div id="connectPanel" style="display:none;">
      <label for="backend">Backend URL</label>
      <input id="backend" type="text" placeholder="https://abhiyadav.in/leetdrill" />
      <button id="codePage">Click here to obtain login code</button>
      <label for="manualToken">Login Token</label>
      <textarea id="manualToken" placeholder="Paste login token from the LeetDrill code page"></textarea>
      <button id="github">GitHub</button>
    </div>

    <div id="todayPanel" style="display:none;">
      <div id="summary" class="muted"></div>
      <div id="problems" class="problem-list"></div>
    </div>

    <script src="compat.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
